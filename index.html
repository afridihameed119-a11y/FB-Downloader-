<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hameed Ullah FB Downloader</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
    font-family:'Segoe UI', sans-serif;
    background:#f1f3f6;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.app{
    width:100%;
    max-width:420px;
}

.card{
    background:#fff;
    padding:20px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    margin-bottom:5px;
}

.sub{
    text-align:center;
    color:#777;
    margin-bottom:20px;
}

/* INPUT */
.input-box{
    display:flex;
    align-items:center;
    background:#f1f3f6;
    padding:10px;
    border-radius:12px;
}

.input-box i{
    color:#1877f2;
    margin-right:10px;
}

.input-box input{
    border:none;
    outline:none;
    width:100%;
    background:transparent;
}

/* LINKS */
.links{
    margin-top:15px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.link-btn{
    text-decoration:none;
    padding:12px;
    border-radius:12px;
    text-align:center;
    font-weight:500;
}

.whatsapp{
    background:#25D366;
    color:#fff;
}

.toolkit{
    background:#111827;
    color:#fff;
}

/* BUTTONS */
.btns{
    display:flex;
    gap:10px;
    margin-top:15px;
}

.btn{
    flex:1;
    padding:12px;
    border:none;
    border-radius:12px;
    font-weight:bold;
    cursor:pointer;
}

.download-btn{
    background:#22c55e;
    color:#fff;
}

.clear-btn{
    background:#e5e7eb;
}

/* RESULT */
.result-card{
    margin-top:20px;
    background:#f9fafb;
    padding:15px;
    border-radius:15px;
    text-align:center;
}

video{
    width:100%;
    border-radius:12px;
    margin-top:10px;
}

.quality{
    margin-top:15px;
    padding:10px;
    border-radius:12px;
    background:#fff;
    box-shadow:0 5px 10px rgba(0,0,0,0.05);
}

.quality button{
    width:100%;
    margin-top:8px;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:#fff;
}

/* LOADER */
.loader{
    border:4px solid #eee;
    border-top:4px solid #22c55e;
    border-radius:50%;
    width:35px;
    height:35px;
    animation:spin 1s linear infinite;
    margin:auto;
}

@keyframes spin{
    100%{transform:rotate(360deg);}
}
</style>
</head>

<body>

<div class="app">
<div class="card">

<h1>Hameed Ullah</h1>
<p class="sub">Facebook Video Downloader</p>

<div class="input-box">
<i class="fab fa-facebook"></i>
<input id="url" placeholder="Paste Facebook link">
</div>

<!-- ✅ WHATSAPP + TOOLKIT -->
<div class="links">
    <a href="https://whatsapp.com/channel/0029Vb7v80n72WTshGXMjm2x" target="_blank" class="link-btn whatsapp">
        <i class="fab fa-whatsapp"></i> Join WhatsApp Channel
    </a>

    <a href="https://toolkit.page.gd/t/hameedullah" target="_blank" class="link-btn toolkit">
        <i class="fas fa-tools"></i> Open Toolkit
    </a>
</div>

<div class="btns">
<button class="btn download-btn" onclick="download()">Download</button>
<button class="btn clear-btn" onclick="clearData()">Clear</button>
</div>

<div id="result"></div>

</div>
</div>

<script>
const API = "https://api.siputzx.my.id/api/d/facebook?url=";

function clearData(){
    document.getElementById("url").value = "";
    document.getElementById("result").innerHTML = "";
}

async function download(){
    let url = document.getElementById("url").value;
    let result = document.getElementById("result");

    if(!url){
        alert("Paste URL first");
        return;
    }

    result.innerHTML = "<div class='loader'></div>";

    try{
        let res = await fetch(API + encodeURIComponent(url));
        let data = await res.json();

        if(!data.status){
            result.innerHTML = "Failed!";
            return;
        }

        let html = `
        <div class="result-card">
            <h3>${data.data.title || "Facebook Video"}</h3>
            <video controls src="${data.data.downloads[0].url}"></video>
        `;

        data.data.downloads.forEach(d=>{
            html += `
            <div class="quality">
                ${d.quality} (${d.type})
                <a href="${d.url}" target="_blank">
                <button>Download</button>
                </a>
            </div>`;
        });

        html += "</div>";

        result.innerHTML = html;

    }catch{
        result.innerHTML = "Error loading video";
    }
}
</script>

</body>
</html>
