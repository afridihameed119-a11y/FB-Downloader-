<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAMEED ULLAH FB DOWNLOADER</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
    font-family: Arial;
    background:#0a0a0a;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.app{
    width:100%;
    max-width:500px;
}

.card{
    background:#111;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 20px #000;
    text-align:center;
}

/* 🌈 COLORFUL NAME */
h1{
    font-size:28px;
    font-weight:bold;
    background:linear-gradient(45deg, red, yellow, lime, cyan, blue, magenta);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:colorMove 5s linear infinite;
}

@keyframes colorMove{
    0%{filter:hue-rotate(0deg);}
    100%{filter:hue-rotate(360deg);}
}

input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    margin-top:15px;
    background:#222;
    color:#fff;
}

.btn{
    width:100%;
    padding:14px;
    margin-top:12px;
    border:none;
    border-radius:10px;
    background:#00c853;
    color:#fff;
    font-weight:bold;
    cursor:pointer;
}

.link-btn{
    display:block;
    margin-top:12px;
    padding:12px;
    border-radius:10px;
    text-decoration:none;
    background:#222;
    color:#00ff88;
}

.result{
    margin-top:15px;
}

.download{
    background:#222;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
}

/* 🔄 LOADER */
.loader{
    margin-top:20px;
    border:5px solid #222;
    border-top:5px solid #00ff88;
    border-radius:50%;
    width:40px;
    height:40px;
    animation:spin 1s linear infinite;
    margin-left:auto;
    margin-right:auto;
}

@keyframes spin{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}

.footer{
    margin-top:15px;
    font-size:12px;
    color:#aaa;
}
</style>
</head>

<body>

<div class="app">
<div class="card">

<h1>HAMEED ULLAH</h1>
<p>Facebook Video Downloader</p>

<a class="link-btn" href="https://whatsapp.com/channel/0029Vb7v80n72WTshGXMjm2x" target="_blank">
<i class="fab fa-whatsapp"></i> Join WhatsApp Channel
</a>

<a class="link-btn" href="https://toolkit.page.gd/t/hameedullah" target="_blank">
<i class="fas fa-tools"></i> Open Toolkit
</a>

<input id="url" placeholder="Paste Facebook Video Link">

<button class="btn" onclick="download()">Download</button>

<div id="result" class="result"></div>

<div class="footer">
DEVELOPER | HAMEED ULLAH
</div>

</div>
</div>

<script>
const API = "https://api.siputzx.my.id/api/d/facebook?url=";

async function download(){
    let url = document.getElementById("url").value;
    let result = document.getElementById("result");

    if(!url){
        alert("Paste URL first");
        return;
    }

    // 🔄 LOADER SHOW
    result.innerHTML = "<div class='loader'></div>";

    try{
        let res = await fetch(API + encodeURIComponent(url));
        let data = await res.json();

        if(!data.status){
            result.innerHTML = "Failed!";
            return;
        }

        let html = "<h3>"+(data.data.title || "Video")+"</h3>";

        data.data.downloads.forEach(d=>{
            html += `
            <div class="download">
                ${d.quality} (${d.type})<br>
                <a href="${d.url}" target="_blank">
                <button class="btn">Download</button>
                </a>
            </div>`;
        });

        result.innerHTML = html;

    }catch{
        result.innerHTML = "Error fetching video";
    }
}
</script>

</body>
</html>
